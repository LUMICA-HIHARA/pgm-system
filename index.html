  return `<div id="filelist-${fieldKey}">
    ${list.map((f,i)=>`
    <div id="fileitem-${f.id}" style="margin-bottom:8px">
      <div style="display:flex;gap:6px;align-items:center">
        <input class="form-input text-mono" style="flex:1;font-size:12px"
          id="fileinput-${f.id}"
          value="${escHtml(f.url||'')}"
          placeholder="ファイル名またはOneDriveパス・URL"
          oninput="onFileInputChange('${pid}','${fieldKey}','${f.id}',this.value)">
        <button onclick="removeFileItem('${pid}','${fieldKey}','${f.id}')"
          style="background:none;border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--danger);cursor:pointer;font-size:13px;flex-shrink:0">✕</button>
      </div>
      <div id="filepreview-${f.id}">${renderFilePreview(f.url||'','fileinput-'+f.id)}</div>
    </div>`).join('')}
  </div>
  <button onclick="addFileItem('${pid}','${fieldKey}')"
    style="margin-top:4px;background:none;border:1px dashed var(--border2);border-radius:var(--radius);padding:5px 14px;color:var(--text2);cursor:pointer;font-size:12px;transition:all 0.15s"
    onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
    onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
    + ファイルを追加
  </button>`;
}

function getFileList(p, fieldKey){
  if(!p.step1) p.step1={};
  if(!p.step1.fileLists) p.step1.fileLists={};
  if(!p.step1.fileLists[fieldKey]||p.step1.fileLists[fieldKey].length===0){
    // IDにfieldKeyを含めて他フィールドと衝突しないようにする
    p.step1.fileLists[fieldKey]=[{id:fieldKey+'_'+Date.now(),url:''}];
  }
  return p.step1.fileLists[fieldKey];
}

function addFileItem(pid, fieldKey){
  const p=state.projects.find(x=>x.id===pid);
  if(!p)return;
  if(!p.step1) p.step1={};
  if(!p.step1.fileLists) p.step1.fileLists={};
  if(!p.step1.fileLists[fieldKey]) p.step1.fileLists[fieldKey]=[];
  const newItem={id:fieldKey+'_'+Date.now(), url:''};
  p.step1.fileLists[fieldKey].push(newItem);
  saveProjects();
  // Re-render just the file list
  const container=document.getElementById('filelist-'+fieldKey);
  if(container){
    const parent=container.parentElement;
    parent.innerHTML=renderFileList(p.step1.fileLists[fieldKey], fieldKey, pid);
  }
}

function removeFileItem(pid, fieldKey, fileId){
  const p=state.projects.find(x=>x.id===pid);
  if(!p||!p.step1?.fileLists?.[fieldKey])return;
  const list=p.step1.fileLists[fieldKey];
  if(list.length<=1){
    // 最後の1件は削除せずクリア
    list[0].url='';
    const el=document.getElementById('fileinput-'+fileId);
    if(el) el.value='';
    const prev=document.getElementById('filepreview-'+fileId);
    if(prev) prev.innerHTML='';
    saveProjects();
    return;
  }
  p.step1.fileLists[fieldKey]=list.filter(f=>f.id!==fileId);
  saveProjects();
  const item=document.getElementById('fileitem-'+fileId);
  if(item) item.remove();
}

function onFileInputChange(pid, fieldKey, fileId, val){
  const p=state.projects.find(x=>x.id===pid);
  if(!p||!p.step1?.fileLists?.[fieldKey])return;
  const file=p.step1.fileLists[fieldKey].find(f=>f.id===fileId);
  if(file) file.url=val;
  saveProjects();
  // Update preview
  const prev=document.getElementById('filepreview-'+fileId);
  if(prev) prev.innerHTML=renderFilePreview(val,'fileinput-'+fileId);
}

// collectStepData時にfileLists内のURLを収集
function collectFileLists(p){
  if(!p.step1?.fileLists) return;
  Object.entries(p.step1.fileLists).forEach(([key, list])=>{
    list.forEach(file=>{
      const el=document.getElementById('fileinput-'+file.id);
      if(el) file.url=el.value;
    });
  });
}


function renderFilePreview(url, inputId){
  if(!url) return '';
  const lower=url.toLowerCase();
  const isImage=/\.(jpe?g|png|gif|webp|bmp|svg)(\?|$)/.test(lower)
    || /^data:image\//.test(lower);
  const isPdf=/\.pdf(\?|$)/.test(lower);
  const isOneDrive=/onedrive\.|sharepoint\.com|1drv\.ms/.test(lower);
  const isGDrive=/drive\.google\.com|docs\.google\.com/.test(lower);

  if(isImage){
    return `<div style="margin-top:8px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;max-height:200px;background:var(--bg3);text-align:center">
      <img src="${escHtml(url)}" alt="プレビュー"
        style="max-width:100%;max-height:200px;object-fit:contain;display:block;margin:0 auto"
        onerror="this.parentElement.innerHTML='<div style=\'padding:12px;font-size:11px;color:var(--text3)\'>画像を読み込めませんでした。URLを確認してください。</div>'">
    </div>`;
  }
  if(isPdf || isOneDrive || isGDrive){
    const label=isPdf?'PDF':'OneDriveで開く';
    const icon=isPdf?'📄':'☁';
    return `<div style="margin-top:8px;display:flex;align-items:center;gap:8px">
      <button class="btn btn-sm" onclick="window.open('${escHtml(url)}','_blank')"
        style="font-size:12px;border-color:rgba(76,158,255,0.4);color:var(--accent)">
        ${icon} ${label}（別タブで開く）
      </button>
      <span style="font-size:11px;color:var(--text3)">※ PDFはOneDriveにアップロードしたファイルの共有リンクを貼ると開けます</span>
    </div>`;
  }
  if(url.startsWith('http')){
    return `<div style="margin-top:8px">
      <button class="btn btn-sm" onclick="window.open('${escHtml(url)}','_blank')"
        style="font-size:12px">🔗 リンクを開く（別タブ）</button>
    </div>`;
  }
  // ローカルパスの場合は案内のみ
  return `<div style="margin-top:6px;font-size:11px;color:var(--text3)">
    ℹ ローカルパスはブラウザから直接開けません。OneDriveの共有リンクに変換してください。
  </div>`;
}

// URL入力時にプレビューをリアルタイム更新
function updateFilePreview(inputId, previewId){
  const input=document.getElementById(inputId);
  const preview=document.getElementById(previewId);

  preview.innerHTML=renderFilePreview(input.value.trim(), inputId);
}


function toggleInherit(pid){
  const p=state.projects.find(x=>x.id===pid);
  if(!p)return;
  if(!p.step2)p.step2={};
  p.step2.inheritOpen=!(p.step2.inheritOpen!==false);
  const body=document.getElementById('inherit-body');
  const lbl=document.getElementById('inherit-toggle-label');
  if(body){body.style.display=p.step2.inheritOpen?'':'none';}
  if(lbl){lbl.textContent=p.step2.inheritOpen?'▲ 非表示':'▼ 表示';}
}

function duplicateQuote(pid,qid){
  const p=state.projects.find(x=>x.id===pid);
  if(!p||!p.step2)return;
  collectQuoteData(p);
  const orig=p.step2.quotes.find(q=>q.id===qid);
  if(!orig)return;
  const copy={...orig,id:'q'+Date.now(),label:(orig.label?orig.label+' (複製)':'')};
  const idx=p.step2.quotes.findIndex(q=>q.id===qid);
  p.step2.quotes.splice(idx+1,0,copy);
  saveProjects();
  document.getElementById('step-content').innerHTML=renderStepContent(p);
}

function validateAndAdvanceStep1(pid){
  const p=state.projects.find(x=>x.id===pid);
  if(!p)return;
  collectStepData(p,1);
  const d=p.step1||{};

  const isNormal=(d.flowType||'normal')==='normal';

  // 各エラー項目 → スクロール対象のelement ID
  const checks= isNormal ? (()=>{
    const isOtherOther=(d.prodType==='other')&&(d.submitType==='other');
    // 製品タイプ「その他」の場合はペンライト仕様不要（提出物が2D/3Dでも）
    const isOtherProd=d.prodType==='other';
    const base=[
      {label:'完成希望期日',       ok:!!d.completionDate,       id:'s1-completiondate'},
      {label:'案件名',             ok:!!(p.name&&p.name.trim()), id:'s1-name'},
      {label:'提出物',             ok:!!d.submitType,            id:'s1-req-block'},
    ];
    if(!isOtherProd) base.push(
      {label:'ペンライトタイプ',   ok:!!d.penType,               id:'s1-pentype'},
      {label:'ペンライトサイズ感', ok:!!d.penSize,               id:'s1-req-block'},
      {label:'スイッチの機能',     ok:!!d.switchType,            id:'s1-req-block'},
      {label:'発光色数',           ok:!!d.lightColor,            id:'s1-req-block'},
      {label:'グリップ部印刷の有無', ok:!!d.grip,                id:'s1-req-block'},
      {label:'ストラップ',         ok:!!d.strap,                 id:'s1-req-block'},
    );
    return base;
  })() : [
    // 現物見積もりフロー
    {label:'完成希望期日', ok:!!d.completionDate,  id:'s1-completiondate'},
    {label:'案件名',       ok:!!(p.name&&p.name.trim()), id:'s1-name'},
  ];

  const failed=checks.filter(c=>!c.ok);

  if(failed.length){
    // エラーメッセージを表示
    const msg=document.getElementById('s1-validation-msg');
    if(msg) msg.textContent='必須項目が未入力です：'+failed.map(c=>c.label).join('、');

    // 最初のエラー項目の要素までスクロール
    const firstId=failed[0].id;
    const el=document.getElementById(firstId);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      // 入力欄の場合はフォーカスとハイライト
      if(el.tagName==='INPUT'||el.tagName==='SELECT'||el.tagName==='TEXTAREA'){
        setTimeout(()=>{
          el.focus();
          el.style.borderColor='var(--danger)';
          el.style.boxShadow='0 0 0 2px rgba(231,76,60,0.25)';
          setTimeout(()=>{
            el.style.borderColor='';
            el.style.boxShadow='';
          }, 2500);
        }, 400);
      }
    }
    showToast('必須項目を入力してください','error');
    return;
  }

  if(p.currentStep<=1) p.currentStep=2;

  // ①→②移行時、見積案が0件なら①の内容を引き継いだ案を1件自動追加
  if(!p.step2) p.step2={};
  if(!p.step2.quotes || p.step2.quotes.length===0){
    const s1=p.step1||{};
    p.step2.quotes=[{
      id:'q'+Date.now(),
      label:'',
      molding:'',
      lot:'',
      targetPrice:'',
      factory:'',
      delivery:'',
      innerQty:'',
      outerQty:'',
      mekki:s1.mekki||'',
      paint:s1.paint||'',
      prodTypeEdit:s1.penType||'',
      penSizeEdit:s1.penSize||'',
      penHeightEdit:s1.penHeight||'',
      switchEdit:s1.switchType||'',
      switchDetailEdit:s1.switchDetail||'',
      lightColorEdit:s1.lightColor||'',
      lightColorDetailEdit:s1.lightColorDetail||'',
      gripEdit:s1.grip||'',
      strapEdit:s1.strap||'',
      strapPrintColorEdit:s1.strapPrintColor||'',
      packageEdit:s1.package||'',
      moldCountEdit:s1.moldCount||'',
      mekkiEdit:s1.mekki||'',
      paintEdit:s1.paint||'',
      designTextEdit:s1.designText||'',
      finalDesignFile:'',
      designChange:'',
    }];
  }

  saveProjects();
  render();
  const isNormalFlow=(p.step1?.flowType||'normal')==='normal';
  showToast(isNormalFlow?'②見積依頼に進みました':'②現物見積依頼に進みました','success');
}

function advanceStep(pid,fromStep){
  const p=state.projects.find(x=>x.id===pid);
  if(!p)return;

  // ②→③ のバリデーション
  if(fromStep===2){
    collectStepData(p,fromStep);
    const errors=validateStep2(p);
    if(errors.length>0){
      showStep2Errors(errors);
      return;
    }
  }

  // ゲート（④〜⑦）は executeGatePass 経由で進む想定だが、
  // 通過済みの場合は直接 advanceStep でも次へ進める
  if(fromStep>=4&&fromStep<=7){
    const g=p.gates&&p.gates['g'+fromStep];
    if(!g?.passed){
      showToast('先に審査通過を確定してください','error');
      return;
    }
  }

  collectStepData(p,fromStep);
  if(p.currentStep<=fromStep){p.currentStep=fromStep+1;}
  saveProjects();
  render();
  showToast('次のフェーズに進みました','success');
}

function validateStep2(p){
  const d=p.step2||{};
  const s1=p.step1||{};
  const isActual=(s1.flowType||'normal')==='actual';
  const errors=[];

  // 共通：販売先
  const clientEl=document.getElementById('s2-client');
  const clientVal=clientEl?.value?.trim()||d.client||'';
  if(!clientVal) errors.push({label:'販売先', section:'【 見積条件（共通）】', id:'s2-client'});

  // 共通：輸送方法
  const shipEl=document.querySelector('input[name="s2-ship"]:checked');
  if(!shipEl&&!d.shipMethod) errors.push({label:'輸送方法', section:'【 見積条件（共通）】', id:'s2-ship-area'});

  if(isActual){
    // 現物：自由記述
    const acEl=document.getElementById('s2-actual-content');
    const acVal=acEl?.value?.trim()||d.actualQuoteContent||'';
    if(!acVal) errors.push({label:'見積内容（自由記述）', section:'【 見積案 】', id:'s2-actual-content'});
  } else {
    // 通常：見積案
    const quotes=d.quotes||[];
    if(quotes.length===0){
      errors.push({label:'見積案が1件もありません', section:'【 見積案 】', id:'quotes-container'});
    } else {
      quotes.forEach((q,i)=>{
        const no=`案${i+1}`;
        if(!q.lot) errors.push({label:`${no}：LOT数量`, section:'【 見積案 】', id:'quotes-container'});

        // 製品タイプ「その他」の場合はペンライト固有項目のチェックをスキップ
        const hasStep1=!!(s1.submitType||s1.penType||s1.concept);
        const isOtherProd=hasStep1&&s1.prodType==='other';

        const pkg=document.querySelector(`[data-qid="${q.id}"][data-field="packageEdit"]`)?.value||q.packageEdit||'';

        if(!isOtherProd){
          const penType=document.querySelector(`[data-qid="${q.id}"][data-field="prodTypeEdit"]`)?.value||q.prodTypeEdit||'';
          const penSize=document.querySelector(`input[name="penSizeEdit_${q.id}"]:checked`)?.value||q.penSizeEdit||'';
          const sw=document.querySelector(`input[name="switchEdit_${q.id}"]:checked`)?.value||q.switchEdit||'';
          const lc=document.querySelector(`input[name="lightColorEdit_${q.id}"]:checked`)?.value||q.lightColorEdit||'';
          const grip=document.querySelector(`input[name="gripEdit_${q.id}"]:checked`)?.value||q.gripEdit||'';
          const strap=document.querySelector(`input[name="strapEdit_${q.id}"]:checked`)?.value||q.strapEdit||'';

          if(!penType)  errors.push({label:`${no}：ペンライトタイプ`, section:'【 仕様の確認・編集 】', id:'step-content'});
          if(!penSize)  errors.push({label:`${no}：ペンライトサイズ感`, section:'【 仕様の確認・編集 】', id:'step-content'});
          if(!sw)       errors.push({label:`${no}：スイッチの機能`, section:'【 仕様の確認・編集 】', id:'step-content'});
          if(!lc)       errors.push({label:`${no}：発光色数`, section:'【 仕様の確認・編集 】', id:'step-content'});
          if(!grip)     errors.push({label:`${no}：グリップ部印刷`, section:'【 仕様の確認・編集 】', id:'step-content'});
          if(!strap)    errors.push({label:`${no}：ストラップ`, section:'【 仕様の確認・編集 】', id:'step-content'});
          if(!pkg)      errors.push({label:`${no}：パッケージ`, section:'【 仕様の確認・編集 】', id:'step-content'});
        }
      });
    }
  }
  return errors;
}

function jumpStep(pid,step){

function collectStepData(p,step){
  if(step===1){
    const name=document.getElementById('s1-name');
    if(name&&name.value.trim()) p.name=name.value.trim();
    if(!p.step1)p.step1={};
    const d=p.step1;
    // text/select fields
    const textFields={
      teamName:'s1-teamname', projectName:'s1-projectname',
      proposalDate:'s1-proposaldate', completionDate:'s1-completiondate',
      concept:'s1-concept', link:'s1-link', refFile:'s1-reffile',
      designFile:'s1-designfile', designText:'s1-designtext',
      penType:'s1-pentype', penHeight:'s1-penheight',

      's1-mockuptype':'mockupType','s1-lightgimmick':'lightGimmick',
    };
    radioFields.forEach(name=>{
      const el=document.querySelector(`input[name="${name}"]:checked`);
      if(el) d[radioMap[name]]=el.value;
    });

  if(step===2){collectQuoteData(p);}

}

      + '</div><div id="g4af-list-'+slot.key+'">';
    files.forEach(function(f,fi){
      var eid = 'g4af-input-'+f.id;
      html += '<div id="g4af-item-'+f.id+'" style="margin-bottom:6px">'
        + '<div style="display:flex;gap:6px;align-items:center">'
        + '<span style="font-size:11px;color:var(--text3);width:18px;flex-shrink:0">'+(fi+1)+'</span>'
        + '<input class="form-input text-mono" style="flex:1;font-size:12px" id="'+eid+'" value="'+escHtml(f.url||'')+'" placeholder="https://1drv.ms/..." onblur="saveG4AttachFile(' + JSON.stringify(p.id) + ',' + JSON.stringify(slot.key) + ',' + JSON.stringify(f.id) + ',this.value)">'
        + '<button onclick="removeG4AttachFile(' + JSON.stringify(p.id) + ',' + JSON.stringify(slot.key) + ',' + JSON.stringify(f.id) + ')" style="background:none;border:1px solid var(--border);border-radius:var(--radius);padding:5px 9px;color:var(--danger);cursor:pointer;font-size:12px;flex-shrink:0">✕</button>'
        + '</div><div id="g4af-preview-'+f.id+'">'+renderFilePreview(f.url||'',eid)+'</div></div>';
    });
    html += '</div><button onclick="addG4AttachFile(' + JSON.stringify(p.id) + ',' + JSON.stringify(slot.key) + ')" style="margin-top:2px;background:none;border:1px dashed var(--border2);border-radius:var(--radius);padding:4px 12px;color:var(--text2);cursor:pointer;font-size:11px">+ ファイルを追加</button></div>';
  });
  html += '</div>';
  return html;
}

function collectGateData(p,step){
  const key=`g${step}`;
  if(!p.gates)p.gates={};
  if(!p.gates[key])p.gates[key]={checks:{}};
  const g=p.gates[key];
  const notesEl=document.getElementById('gate-notes-'+step);
  if(notesEl) g.notes=notesEl.value;
  const dateEl=document.getElementById('gate-date-'+step);
  if(dateEl) g.reviewDate=dateEl.value;
  const reviewerEl=document.getElementById('gate-reviewer-'+step);
  if(reviewerEl) g.reviewer=reviewerEl.value;
  // G2専用：3部門審査員名
  if(step===4){
    const rs=document.getElementById('gate-reviewer-s-4');
    const rd=document.getElementById('gate-reviewer-d-4');
    const rq=document.getElementById('gate-reviewer-q-4');
    if(rs) g.reviewerS=rs.value;
    if(rd) g.reviewerD=rd.value;
    if(rq) g.reviewerQ=rq.value;
  }
  // G3専用：開発・品管の審査員名
  if(step===5){
    const rd=document.getElementById('gate-reviewer-d-5');
    const rq=document.getElementById('gate-reviewer-q-5');
    if(rd) g.reviewerD=rd.value;
    if(rq) g.reviewerQ=rq.value;
  }
  // G5専用：営業・開発・品管の審査員名 + 正式名称 + 3欄添付
  if(step===7){
    const rs=document.getElementById('gate-reviewer-s-7');
    const rd=document.getElementById('gate-reviewer-d-7');
    const rq=document.getElementById('gate-reviewer-q-7');
    if(rs) g.reviewerS=rs.value;
    if(rd) g.reviewerD=rd.value;
    if(rq) g.reviewerQ=rq.value;
    const fn=document.getElementById('g5-formal-name');
    if(fn) g.formalName=fn.value;
    // 納品情報フィールド（直接ID指定）
    const delivMap={
      delivQty:'g5-deliv-qty', delivPrice:'g5-deliv-price',
      delivMoldPrice:'g5-deliv-mold-price', delivDate:'g5-deliv-date', delivMethod:'g5-deliv-method'
    };
    Object.entries(delivMap).forEach(([key,id])=>{
      const el=document.getElementById(id);
      if(el) g[key]=el.value;
    });
    // 添付ファイル（5欄）
    if(!g.attachFiles) g.attachFiles={};
    ['attach1','attach2','attach3','attach4','attach5'].forEach(k=>{
      const af=g.attachFiles[k];
      if(af) af.forEach(f=>{
        const el=document.getElementById('g5af-input-'+f.id);
        if(el) f.url=el.value;
      });
    });
  }
  // G4専用：営業・開発・品管の審査員名 + 5欄添付データ
  if(step===6){
    const rs=document.getElementById('gate-reviewer-s-6');
    const rd=document.getElementById('gate-reviewer-d-6');
    const rq=document.getElementById('gate-reviewer-q-6');
    if(rs) g.reviewerS=rs.value;
    if(rd) g.reviewerD=rd.value;
    if(rq) g.reviewerQ=rq.value;
    // 5欄の複数ファイルを収集
    if(!g.attachFiles) g.attachFiles={};
    ['attach1','attach2','attach3','attach4','attach5'].forEach(k=>{
      const af=g.attachFiles[k];
      if(af) af.forEach(f=>{
        const el=document.getElementById('g4af-input-'+f.id);
        if(el) f.url=el.value;
      });
    });
  }
  // サンプルファイルURLを収集
  if(g.sampleFiles){
    g.sampleFiles.forEach(f=>{
      const el=document.getElementById('gsfinput-'+f.id);
      if(el) f.url=el.value;
    });
  }
}

// G4添付：ファイル行を追加
function addG4AttachFile(pid, slotKey){
  const p=state.projects.find(x=>x.id===pid);
  if(!p)return;
  if(!p.gates) p.gates={};
  if(!p.gates['g6']) p.gates['g6']={checks:{}};
  const g=p.gates['g6'];
  if(!g.attachFiles) g.attachFiles={};
  if(!g.attachFiles[slotKey]||g.attachFiles[slotKey].length===0)
    g.attachFiles[slotKey]=[{id:slotKey+'_0',url:''}];
  const newId=slotKey+'_'+Date.now();
  const newIdx=g.attachFiles[slotKey].length+1;
  g.attachFiles[slotKey].push({id:newId,url:''});

    div.style.marginBottom='6px';

      <div style="display:flex;gap:6px;align-items:center">

        <input class="form-input text-mono" style="flex:1;font-size:12px"
          id="g4af-input-${newId}" value=""
          placeholder="https://1drv.ms/... または画像URL"
          onblur="saveG4AttachFile('${pid}','${slotKey}','${newId}',this.value)">
        <button onclick="removeG4AttachFile('${pid}','${slotKey}','${newId}')"
          style="background:none;border:1px solid var(--border);border-radius:var(--radius);padding:5px 9px;color:var(--danger);cursor:pointer;font-size:12px;flex-shrink:0">✕</button>

    document.getElementById('g4af-input-'+newId)?.focus();
  }
}

// G4添付：ファイル行を削除（最後の1行はURLのみクリア）
function removeG4AttachFile(pid, slotKey, fileId){
  const p=state.projects.find(x=>x.id===pid);
  if(!p?.gates?.g6?.attachFiles?.[slotKey])return;
  const files=p.gates['g6'].attachFiles[slotKey];
  if(files.length<=1){
    files[0].url='';
    const el=document.getElementById('g4af-input-'+fileId);
    if(el) el.value='';
    const pv=document.getElementById('g4af-preview-'+fileId);
    if(pv) pv.innerHTML='';
    saveProjects();return;
  }
  p.gates['g6'].attachFiles[slotKey]=files.filter(f=>f.id!==fileId);
  saveProjects();
  const item=document.getElementById('g4af-item-'+fileId);
  if(item) item.remove();
}

// ===== GATE PASS / REJECT =====
function confirmGatePass(pid, step){
  // ゲートキー取得
  const gkey = 'g' + step;
  const p = state.projects.find(function(x){ return x.id===pid; });
  if(!p) return;
  if(!p.gates) p.gates = {};
  if(!p.gates[gkey]) p.gates[gkey] = {checks:{}};
  const g = p.gates[gkey];

  // 審査員名をDOMから取得・保存
  var revD = document.getElementById('gate-reviewer-d-' + step);
  var revQ = document.getElementById('gate-reviewer-q-' + step);
  var revS = document.getElementById('gate-reviewer-s-' + step);
  if(revS) g.reviewerS = revS.value.trim();
  if(revD) g.reviewerD = revD.value.trim();
  if(revQ) g.reviewerQ = revQ.value.trim();

  // G3（step=5）のバリデーション
  if(step === 5){
    if(!g.reviewerD || !g.reviewerQ){
      showToast('開発・品管の審査員名を入力してください', 'error');
      return;
    }
  }

  // 審査日・コメント保存
  var dateEl  = document.getElementById('gate-date-' + step);
  var notesEl = document.getElementById('gate-notes-' + step);
  if(dateEl)  g.reviewDate = dateEl.value;
  if(notesEl) g.notes = notesEl.value;

  // 審査員名を表示用に結合
  var parts = [g.reviewerS, g.reviewerD, g.reviewerQ].filter(Boolean);
  var reviewer = parts.length ? parts.join(' / ') : (state.user ? state.user.name : '');

  // 通過フラグをセット
  g.passed    = true;
  g.rejected  = false;
  g.rejectedInfo = null;
  g.passedInfo = {
    date:     g.reviewDate || (new Date().toISOString().slice(0,10)),
    reviewer: reviewer
  };

  // ステップ進行
  if(p.currentStep <= step) p.currentStep = step + 1;

  saveProjects();
  // state.projectIdを確実にセットしてから全画面再描画
  state.projectId = pid;
  state.screen = 'project';
  // 通過後は_viewStepをクリアして最新ステップを表示
  p._viewStep = null;
  render();
  showToast(GATE_INFO[step].name + ' — 審査通過を記録しました', 'success');
}

function executeGateReject(pid,step){
  const reason=document.getElementById('reject-reason')?.value?.trim()||'';
  const date=document.getElementById('reject-date')?.value||'';
  const reviewer=document.getElementById('reject-reviewer')?.value?.trim()||'';
  if(!reason){showToast('差し戻し理由を入力してください','error');return;}
  if(!reviewer){showToast('担当者名を入力してください','error');return;}

  const p=state.projects.find(x=>x.id===pid);
  if(!p)return;
  const g=p.gates['g'+step];
  g.rejected=true;
  g.passed=false;
  g.rejectedInfo={date, reviewer, reason};
  g.passedInfo=null;
  // 前ステップに差し戻し（ステータスは保持）
  saveProjects();
  closeModal();
  render();
  showToast(GATE_INFO[step].name+' — 差し戻しを記録しました','error');
}

let _mergeQueue=[];

function handleMergeFiles(e){
  const files=Array.from(e.target.files||[]);
  if(!files.length)return;
  _mergeQueue=[];
  const listEl=document.getElementById('merge-file-list');
  const btnEl=document.getElementById('merge-execute-btn');
  let loaded=0;
  let html='<div style="text-align:left">';
  files.forEach((file,i)=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.projects&&Array.isArray(data.projects)){
          _mergeQueue.push({filename:file.name,data});
          html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
            <span style="color:var(--success)">✓</span>

          </div>`;
        } else {
          html+=`<div style="color:var(--danger);font-size:12px;padding:4px 0">✕ ${file.name}（無効なファイル）</div>`;
        }
      }catch(err){
        html+=`<div style="color:var(--danger);font-size:12px;padding:4px 0">✕ ${file.name}（解析エラー）</div>`;
      }
      loaded++;
      if(loaded===files.length){
        html+='</div>';
        if(listEl) listEl.innerHTML=html;
        if(btnEl){
          btnEl.disabled=_mergeQueue.length===0;
          btnEl.style.opacity=_mergeQueue.length>0?'1':'0.4';
        }
      }
    };
    reader.readAsText(file);
  });
  e.target.value='';
}

function executeMerge(){
  if(!_mergeQueue.length)return;
  // Start from current data
  const projectMap=new Map(state.projects.map(p=>[p.id,{...p,_src:'current',_at:state.lastSaved||''}]));
  const userMap=new Map(state.users.map(u=>[u.id,u]));
  let totalAdded=0, totalUpdated=0;

  _mergeQueue.forEach(({data})=>{
    const srcAt=data.exportedAt||'';
    (data.projects||[]).forEach(p=>{
      const existing=projectMap.get(p.id);
      if(!existing){
        projectMap.set(p.id,p);
        totalAdded++;
      } else {
        // Compare by exportedAt — newer wins
        if(!existing._at||srcAt>existing._at){
          projectMap.set(p.id,{...p,_src:'merged',_at:srcAt});
          totalUpdated++;
        }
      }
    });
    (data.users||[]).forEach(u=>{
      if(!userMap.has(u.id)) userMap.set(u.id,u);
    });
  });

  // Clean up internal tracking fields
  state.projects=Array.from(projectMap.values()).map(p=>{
    const {_src,_at,...clean}=p; return clean;
  });
  state.users=Array.from(userMap.values());
  saveProjects();
  saveUsers(state.users);
  _mergeQueue=[];
  closeModal();
  showToast(`マージ完了 — 追加:${totalAdded}件 / 更新:${totalUpdated}件`,'success');
  render();
}

function handleImportFile(e){
  const file=e.target.files?.[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.projects||!Array.isArray(data.projects)){
        showToast('有効なPGMデータファイルではありません','error');return;

      showImportConfirm(data,file.name);
    }catch(err){
      showToast('JSONの解析に失敗しました','error');
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

function executeImport(data){
  const mode=document.getElementById('import-mode')?.value||'replace';
  if(mode==='replace'){
    state.projects=data.projects;
    state.nextNum=data.nextNum||state.nextNum;
    if(data.users) state.users=data.users;
    if(data.settings) state.settings=data.settings;
  } else {
    const existing=new Map(state.projects.map(p=>[p.id,p]));
    data.projects.forEach(p=>existing.set(p.id,p));
    state.projects=Array.from(existing.values());
    if(data.nextNum>state.nextNum) state.nextNum=data.nextNum;
    if(data.users){
      const eu=new Map(state.users.map(u=>[u.id,u]));
      data.users.forEach(u=>eu.set(u.id,u));
      state.users=Array.from(eu.values());
    }
    if(data.settings) state.settings={...state.settings,...data.settings};
  }
  saveProjects();
  saveNextNum();
  if(data.users) saveUsers(state.users);
  if(data.settings) saveSettings();
  closeModal();
  showToast(`${data.projects.length}件のデータを読み込みました`,'success');
  state.screen='dashboard';
  render();
}

function executeDangerAction(type, pid){
  // チェック確認
  const check=document.getElementById('danger-check');
  if(!check||!check.checked){
    const err=document.getElementById('danger-pw-error');
    if(err) err.textContent='確認チェックボックスをオンにしてください';
    return;
  }

  // パスワード確認
  const pwInput=document.getElementById('danger-pw-input');
  const pw=pwInput?pwInput.value:'';
  const customHash=state.settings?.adminPwHash;
  const defaultHash=hashSync('pgm-admin');
  const valid=customHash?hashSync(pw)===customHash:hashSync(pw)===defaultHash;

  if(!valid){
    const err=document.getElementById('danger-pw-error');
    if(err) err.textContent='パスワードが違います';
    if(pwInput) pwInput.focus();
    return;
  }

  closeDangerModal();

  if(type==='alldata'){
    clearAllData();
  } else if(type==='project'){
    deleteProject(pid);
  }
}

function deleteProject(pid){
  const p=state.projects.find(x=>x.id===pid);
  if(!p) return;
  const name=p.name;
  state.projects=state.projects.filter(x=>x.id!==pid);
  saveProjects();
  showDashboard();
  showToast(`案件「${name}」を削除しました`,'error');
}

function duplicateProject(pid){
  const src=state.projects.find(x=>x.id===pid);
  if(!src) return;
  const newId='p'+Date.now();
  const newNum='PGM-'+state.nextNum;
  state.nextNum++;
  saveNextNum();
  // Deep copy
  const copy=JSON.parse(JSON.stringify(src));
  copy.id=newId;
  copy.num=newNum;
  copy.name=src.name+'（複製）';
  copy.createdAt=new Date().toISOString().slice(0,10);
  copy.createdBy=state.user?.name||'';
  copy.currentStep=1;
  // Reset approvals and gate progress
  if(copy.step3){copy.step3.dept={};copy.step3.approvalInfo={};}
  copy.gates={g4:{checks:{}},g5:{checks:{}},g6:{checks:{}},g7:{checks:{}}};
  copy.step8={};
  state.projects.push(copy);
  saveProjects();
  showToast(`「${copy.name}」を作成しました`,'success');
  render();
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.innerHTML=`<span style="color:${type==='success'?'var(--success)':'var(--danger)'}font-style:normal"></span>${msg}`;
  t.className=`toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.className='toast';},2500);
}
